<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO诊断报告</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --dr-primary: #0d9488;
  --dr-primary-light: #f0fdfa;
  --dr-primary-border: #99f6e4;
  --dr-success: #059669;
  --dr-success-light: #f0fdf4;
  --dr-success-border: #a7f3d0;
  --dr-warning: #d97706;
  --dr-warning-light: #fffbeb;
  --dr-warning-border: #fde68a;
  --dr-danger: #dc2626;
  --dr-danger-light: #fef2f2;
  --dr-danger-border: #fecaca;
  --dr-info: #3b82f6;
  --dr-info-light: #eff6ff;
  --dr-info-border: #bfdbfe;
  --dr-purple: #8b5cf6;
  --dr-purple-light: #f5f3ff;
  --dr-sky: #0ea5e9;
  --dr-sky-light: #f0f9ff;
  --dr-bg-page: #f7f8fa;
  --dr-bg-card: #fff;
  --dr-bg-subtle: #f8fafc;
  --dr-border: #e5e7eb;
  --dr-border-light: #e8edf8;
  --dr-border-subtle: #f1f5f9;
  --dr-text-primary: #0f172a;
  --dr-text-secondary: #334155;
  --dr-text-muted: #475569;
  --dr-text-tertiary: #64748b;
  --dr-text-placeholder: #94a3b8;
  --dr-text-disabled: #cbd5e1;
  --dr-orange: #f97316;
  --dr-orange-light: #fff7ed;
  --dr-bg-bar-track: #e2e8f0;
  --dr-purple-border: #ddd6fe;
  --dr-sky-border: #bae6fd;
  --dr-radius-xs: 4px;
  --dr-radius-sm: 6px;
  --dr-radius-md: 8px;
  --dr-radius-lg: 10px;
  --dr-radius-xl: 14px;
  --dr-radius-2xl: 16px;
}

/* ===== Reset & Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--dr-bg-page);
  color: var(--dr-text-secondary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  scroll-behavior: smooth;
}
:focus-visible {
  outline: 2px solid var(--dr-primary);
  outline-offset: 2px;
}

/* ===== Page Layout ===== */
.dr-page {
  min-height: 100vh;
  padding: 0 0 48px;
  background: var(--dr-bg-page);
}
.dr-content {
  width: min(1080px, calc(100% - 64px));
  padding-top: 28px;
  margin: 0 auto;
}

/* ===== Hero Section ===== */
.dr-hero {
  position: relative;
  padding: 48px 40px 40px;
  margin-bottom: 28px;
  overflow: hidden;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  border-radius: var(--dr-radius-2xl);
}
.dr-hero__body {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 36px;
  align-items: center;
  justify-content: space-between;
}
.dr-hero__main {
  flex: 1;
  min-width: 0;
}
.dr-hero__badge-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.dr-hero__badge {
  padding: 4px 14px;
  font-size: 12px;
  font-weight: 500;
  border-radius: 999px;
  letter-spacing: 0.02em;
}
.dr-hero__badge--category {
  color: #99f6e4;
  background: rgb(255 255 255 / 8%);
  border: 1px solid rgb(255 255 255 / 12%);
}
.dr-hero__badge--report {
  color: #a5b4fc;
  background: rgb(99 102 241 / 15%);
  border: 1px solid rgb(99 102 241 / 20%);
}
.dr-hero__title {
  margin: 0;
  font-size: 36px;
  font-weight: 700;
  line-height: 1.15;
  color: #fff;
  letter-spacing: -0.02em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dr-hero__title-accent {
  background: linear-gradient(135deg, #14b8a6, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.dr-hero__subtitle {
  margin-top: 8px;
  font-size: 16px;
  font-weight: 400;
  color: #94a3b8;
  line-height: 1.5;
}
.dr-hero__meta {
  margin-top: 20px;
  display: flex;
  gap: 20px;
  align-items: center;
}
.dr-hero__date {
  font-size: 13px;
  color: rgb(148 163 184 / 70%);
}
.dr-hero__divider-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgb(148 163 184 / 40%);
}
.dr-hero__engine {
  font-size: 13px;
  color: rgb(148 163 184 / 70%);
}
.dr-hero__score-group {
  display: flex;
  flex-shrink: 0;
  gap: 20px;
  align-items: center;
}
.dr-hero__score-ring {
  position: relative;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dr-hero__score-ring svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 120px;
  height: 120px;
  transform: rotate(-90deg);
}
.dr-hero__score-ring-bg {
  fill: none;
  stroke: #334155;
  stroke-width: 8;
}
.dr-hero__score-ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s ease;
}
.dr-hero__score-inner { text-align: center; }
.dr-hero__score-value {
  font-size: 36px;
  font-weight: 700;
  line-height: 1;
}
.dr-hero__score-unit {
  margin-top: 4px;
  font-size: 13px;
  color: #64748b;
}
.dr-hero__grade-badge {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
  padding: 14px 22px;
  border: 1px solid;
  border-radius: var(--dr-radius-lg);
  background: rgb(255 255 255 / 4%);
  backdrop-filter: blur(8px);
}
.dr-hero__grade-label {
  font-size: 11px;
  color: #94a3b8;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.dr-hero__grade-value {
  font-size: 30px;
  font-weight: 700;
  line-height: 1;
}
.dr-hero__grade-desc {
  font-size: 12px;
  color: #94a3b8;
}

/* ===== Section ===== */
.dr-section {
  padding: 32px 32px;
  margin-bottom: 20px;
  background: var(--dr-bg-card);
  border: 1px solid var(--dr-border);
  border-radius: var(--dr-radius-xl);
  box-shadow: 0 1px 4px rgb(0 0 0 / 4%);
}
.dr-section__header {
  display: flex;
  gap: 14px;
  align-items: baseline;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--dr-border-subtle);
}
.dr-section__num {
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 700;
  color: var(--dr-primary);
  letter-spacing: 0.04em;
  background: var(--dr-primary-light);
  padding: 2px 8px;
  border-radius: var(--dr-radius-xs);
}
.dr-section__title-group { flex: 1; }
.dr-section__title {
  margin: 0;
  font-size: 22px;
  font-weight: 700;
  color: var(--dr-text-primary);
}
.dr-section__subtitle {
  margin: 6px 0 0;
  font-size: 14px;
  color: var(--dr-text-tertiary);
}

/* ===== 01 Overview ===== */
.stage-overview__stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.stage-overview__stat-card {
  padding: 16px 14px;
  text-align: center;
  background: var(--dr-bg-subtle);
  border: 1px solid var(--dr-border-light);
  border-radius: var(--dr-radius-sm);
}
.stage-overview__stat-card--score { background: var(--dr-bg-card); border-left: 3px solid var(--dr-primary); }
.stage-overview__stat-card--highlight { background: var(--dr-bg-card); border-left: 3px solid var(--dr-success); }
.stage-overview__stat-card--risk { background: var(--dr-bg-card); border-left: 3px solid var(--dr-warning); }
.stage-overview__stat-value { font-size: 24px; font-weight: 700; color: var(--dr-text-primary); }
.stage-overview__stat-card--score .stage-overview__stat-value { color: var(--dr-primary); }
.stage-overview__stat-card--highlight .stage-overview__stat-value { color: var(--dr-success); }
.stage-overview__stat-card--risk .stage-overview__stat-value { color: var(--dr-warning); }
.stage-overview__stat-label { margin-top: 2px; font-size: 12px; color: var(--dr-text-muted); }
.stage-overview__summary {
  display: flex;
  gap: 12px;
  padding: 12px 14px;
  background: var(--dr-bg-subtle);
  border: 1px solid var(--dr-border);
  border-radius: var(--dr-radius-sm);
}
.stage-overview__summary-icon {
  display: flex;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  font-size: 14px;
  color: var(--dr-primary);
  background: var(--dr-primary-light);
  border-radius: var(--dr-radius-sm);
}
.stage-overview__summary-text { font-size: 13px; line-height: 1.7; color: var(--dr-text-secondary); white-space: pre-wrap; }
.stage-overview__section { margin-top: 20px; }
.stage-overview__section-title {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 700;
  color: var(--dr-success);
}
.stage-overview__section-title--risk { color: var(--dr-warning); }
.stage-overview__list {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--dr-border-light);
  border-radius: var(--dr-radius-sm);
  overflow: hidden;
}
.stage-overview__list-item {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 8px 12px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--dr-text-secondary);
  border-bottom: 1px solid var(--dr-border-subtle);
}
.stage-overview__list-item:last-child { border-bottom: none; }
.stage-overview__list-item--highlight { background: var(--dr-success-light); }
.stage-overview__list-item--risk { background: var(--dr-warning-light); }
.stage-overview__list-item { transition: background 0.15s; }
.stage-overview__list-item:hover { background: var(--dr-bg-subtle); }
.stage-overview__list-icon { flex-shrink: 0; margin-top: 2px; font-size: 13px; }
.stage-overview__list-item--highlight .stage-overview__list-icon { color: var(--dr-success); }
.stage-overview__list-item--risk .stage-overview__list-icon { color: #f59e0b; }

/* ===== 02 AIVO Score ===== */
.stage-aivo__hero {
  display: flex;
  gap: 28px;
  align-items: center;
  padding: 20px;
  background: var(--dr-bg-subtle);
  border: 1px solid var(--dr-border);
  border-radius: var(--dr-radius-lg);
  overflow: visible;
}
.stage-aivo__score-inner { text-align: center; }
.stage-aivo__score-value { font-size: 28px; font-weight: 700; line-height: 1; }
.stage-aivo__score-unit { margin-top: 2px; font-size: 12px; color: var(--dr-text-placeholder); }
.stage-aivo__hero-info { flex: 1; }
.stage-aivo__level-tag { padding: 4px 16px; font-size: 14px; }
.stage-aivo__commentary { margin-top: 12px; font-size: 14px; line-height: 1.7; color: var(--dr-text-muted); }
.stage-aivo__benchmark {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 12px;
  padding: 8px 14px;
  font-size: 13px;
  background: rgb(255 255 255 / 60%);
  border-radius: var(--dr-radius-md);
}
.stage-aivo__benchmark-label { color: var(--dr-text-tertiary); }
.stage-aivo__benchmark-value { font-weight: 700; color: var(--dr-primary); }
.stage-aivo__benchmark-rank { color: var(--dr-text-muted); }
.stage-aivo__benchmark-rank strong { color: var(--dr-success); }
.stage-aivo__dimensions { margin-top: 24px; }
.stage-aivo__dimensions-title { margin-bottom: 16px; font-size: 15px; font-weight: 700; color: var(--dr-text-primary); }
.stage-aivo__dimension-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.stage-aivo__dimension-card {
  padding: 16px;
  background: var(--dr-bg-card);
  border: 1px solid var(--dr-border-light);
  border-left: 3px solid var(--dim-color);
  border-radius: var(--dr-radius-md);
}
.stage-aivo__dimension-score { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
.stage-aivo__dimension-num { font-size: 22px; font-weight: 700; color: var(--dim-color); }
.stage-aivo__dimension-weight { font-size: 12px; font-weight: 600; color: var(--dr-text-placeholder); }
.stage-aivo__dimension-name { margin-bottom: 6px; font-size: 14px; font-weight: 600; color: var(--dr-text-primary); }
.stage-aivo__dimension-comment { margin-bottom: 10px; font-size: 12px; line-height: 1.6; color: var(--dr-text-tertiary); }

/* ===== 03 User Profile ===== */
.stage-user-profile { display: flex; flex-wrap: wrap; gap: 24px; }
.stage-up__radar-section {
  width: 100%;
  padding: 24px;
  background: var(--dr-bg-subtle);
  border: 1px solid var(--dr-border);
  border-radius: var(--dr-radius-lg);
  box-sizing: border-box;
  overflow: visible;
}
.stage-up__section-title { margin-bottom: 16px; font-size: 15px; font-weight: 700; color: var(--dr-text-primary); }
.stage-up__radar-row { display: flex; gap: 24px; align-items: flex-start; }
.stage-up__radar-chart-wrap { flex-shrink: 0; width: 220px; max-width: 100%; overflow: visible; }
.stage-up__dimension-list {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.stage-up__dim-item { display: flex; gap: 8px; align-items: center; }
.stage-up__dim-label { width: 72px; font-size: 13px; color: var(--dr-text-muted); text-align: right; white-space: nowrap; }
.stage-up__dim-bar { flex: 1; height: 8px; background: var(--dr-bg-bar-track); border-radius: var(--dr-radius-xs); overflow: hidden; }
.stage-up__dim-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.stage-up__dim-value { width: 28px; font-size: 14px; font-weight: 700; color: var(--dr-primary); }
.stage-up__groups { flex: 1; min-width: 260px; }
.stage-up__groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.stage-up__group-card { padding: 18px; background: var(--dr-bg-card); border: 1px solid var(--dr-border-light); border-radius: var(--dr-radius-md); }
.stage-up__group-highlight { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; font-size: 15px; font-weight: 700; color: var(--dr-text-primary); }
.stage-up__group-index {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  background: var(--dr-primary);
  border-radius: 50%;
  flex-shrink: 0;
}
.stage-up__group-profile, .stage-up__group-scenario { margin-bottom: 8px; font-size: 13px; line-height: 1.7; color: var(--dr-text-muted); }
.stage-up__group-profile strong, .stage-up__group-scenario strong { color: var(--dr-text-primary); }
.stage-up__questions-label { margin-bottom: 6px; font-size: 12px; font-weight: 600; color: var(--dr-text-tertiary); }
.stage-up__questions-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.stage-up__question-tag {
  max-width: 240px;
  overflow: hidden;
  font-size: 12px;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 2px 8px;
  border-radius: var(--dr-radius-sm);
  color: var(--dr-primary);
  background: var(--dr-primary-light);
  border: 1px solid var(--dr-primary-border);
}

/* ===== 04 AI Search ===== */
.stage-ais__stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
.stage-ais__stat-card {
  padding: 20px 16px;
  text-align: center;
  background: var(--dr-bg-subtle);
  border: 1px solid var(--dr-border-light);
  border-radius: var(--dr-radius-md);
}
.stage-ais__stat-card--primary { background: var(--dr-bg-card); border-left: 3px solid var(--dr-primary); }
.stage-ais__stat-value { font-size: 26px; font-weight: 700; color: var(--dr-text-primary); }
.stage-ais__stat-card--primary .stage-ais__stat-value { color: var(--dr-primary); }
.stage-ais__stat-unit { font-size: 14px; font-weight: 600; }
.stage-ais__stat-label { margin-top: 4px; font-size: 12px; color: var(--dr-text-tertiary); }
.stage-ais__section { margin-top: 24px; }
.stage-ais__section-title { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; font-size: 15px; font-weight: 700; color: var(--dr-text-primary); }
.stage-ais__section-count { margin-left: auto; font-size: 12px; font-weight: 500; color: var(--dr-text-placeholder); }
.stage-ais__platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.stage-ais__platform-card { padding: 16px; background: var(--dr-danger-light); border: 1px solid var(--dr-danger-border); border-radius: var(--dr-radius-md); }
.stage-ais__platform-card--mentioned { background: var(--dr-success-light); border-color: var(--dr-success-border); }
.stage-ais__platform-header { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.stage-ais__platform-name { font-size: 14px; font-weight: 700; color: var(--dr-text-primary); }
.stage-ais__platform-tag { font-size: 11px; font-weight: 600; border-radius: var(--dr-radius-sm); padding: 2px 8px; background: var(--dr-bg-subtle); color: var(--dr-text-tertiary); }
.stage-ais__platform-metrics { display: flex; gap: 12px; font-size: 12px; color: var(--dr-text-tertiary); }
.stage-ais__platform-metrics strong { color: var(--dr-text-primary); }
.stage-ais__question-table { border: 1px solid var(--dr-border-light); border-radius: var(--dr-radius-md); overflow: hidden; }
.stage-ais__qtable-head {
  display: flex;
  gap: 0;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--dr-text-tertiary);
  background: var(--dr-bg-subtle);
  border-bottom: 1px solid var(--dr-border-light);
}
.stage-ais__qtable-row {
  display: flex;
  gap: 0;
  padding: 10px 16px;
  border-bottom: 1px solid var(--dr-border-subtle);
  transition: background 0.15s;
}
.stage-ais__qtable-row:last-child { border-bottom: none; }
.stage-ais__qtable-row:hover { background: var(--dr-bg-subtle); }
.stage-ais__qtable-col--question { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; }
.stage-ais__qtable-col--platforms { flex-shrink: 0; width: 180px; display: flex; align-items: center; justify-content: flex-end; }
.stage-ais__q-text { font-size: 13px; font-weight: 600; color: var(--dr-text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; max-width: 50%; }
.stage-ais__q-highlight { font-size: 11px; color: var(--dr-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.stage-ais__q-mentions { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; }
.stage-ais__q-mention-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 20px;
  padding: 0 4px;
  font-size: 10px;
  font-weight: 600;
  border-radius: 4px;
}
.stage-ais__q-mention-dot--yes { color: var(--dr-success); background: var(--dr-success-light); border: 1px solid var(--dr-success-border); }
.stage-ais__q-mention-dot--no { color: var(--dr-text-tertiary); background: var(--dr-bg-subtle); border: 1px solid var(--dr-bg-bar-track); }

/* ===== 05 Infra Eval ===== */
.stage-infra__grid { display: flex; flex-direction: column; gap: 16px; }
.stage-infra__card { overflow: hidden; background: var(--dr-bg-card); border: 1px solid var(--dr-border-light); border-radius: var(--dr-radius-md); }
.stage-infra__card--site { border-left: 3px solid var(--dr-primary); }
.stage-infra__card-header {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 14px 16px;
  background: var(--dr-bg-subtle);
  border-bottom: 1px solid var(--dr-border-subtle);
}
.stage-infra__card-icon { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; font-size: 16px; border-radius: var(--dr-radius-md); }
.stage-infra__card-icon--site { color: var(--dr-primary); background: var(--dr-primary-light); }
.stage-infra__card-icon--media { color: var(--dr-sky); background: var(--dr-sky-light); }
.stage-infra__card-icon--auth { color: var(--dr-purple); background: var(--dr-purple-light); }
.stage-infra__card-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--dr-text-primary); }
.stage-infra__card-body { display: flex; flex-direction: column; gap: 12px; padding: 16px; }
.stage-infra__banner { overflow: hidden; border-radius: var(--dr-radius-md); }
.stage-infra__banner-img { display: block; width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--dr-radius-md); }
.stage-infra__logo-row { display: flex; align-items: center; }
.stage-infra__logo-img { width: 48px; height: 48px; object-fit: contain; border-radius: var(--dr-radius-md); background: var(--dr-bg-subtle); }
.stage-infra__field { display: flex; gap: 12px; align-items: center; font-size: 14px; }

/* Competitor Advantage Logic */

<script>
(function() {
  'use strict';

  // ===== Utilities =====
  function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function getColor(score) {
    if (score >= 90) return '#059669';
    if (score >= 75) return '#0d9488';
    if (score >= 60) return '#d97706';
    return '#dc2626';
  }
  function getGrade(score) {
    if (score >= 90) return '优秀';
    if (score >= 75) return '良好';
    if (score >= 60) return '一般';
    return '较差';
  }
  function getGradeInfo(grade) {
    var map = {
      '优秀': { color: '#059669', bg: '#f0fdf4', label: 'A' },
      '良好': { color: '#0d9488', bg: '#f0fdfa', label: 'B' },
      '一般': { color: '#d97706', bg: '#fffbeb', label: 'C' },
      '较差': { color: '#dc2626', bg: '#fef2f2', label: 'D' }
    };
    return map[grade] || map['一般'];
  }
  function getMentionColor(rate) {
    if (rate >= 0.5) return '#059669';
    if (rate >= 0.25) return '#d97706';
    return '#dc2626';
  }
  function getThreatInfo(level) {
    var map = {
      'high': { color: '#dc2626', bg: '#fef2f2', label: '高威胁' },
      'medium': { color: '#d97706', bg: '#fffbeb', label: '中威胁' },
      'low': { color: '#059669', bg: '#f0fdf4', label: '低威胁' }
    };
    return map[level] || map['medium'];
  }
  function getPriorityInfo(priority) {
    var map = {
      'high': { color: 'var(--dr-orange)', bg: 'var(--dr-orange-light)', label: 'P1高优', cls: 'urgent' },
      'medium': { color: 'var(--dr-warning)', bg: 'var(--dr-warning-light)', label: 'P2中等', cls: 'medium' },
      'low': { color: 'var(--dr-success)', bg: 'var(--dr-success-light)', label: 'P3建议', cls: 'low' }
    };
    return map[priority] || map['medium'];
  }
  function fmtRate(r) { return (r * 100).toFixed(1); }
  /* circumference calculated inline per chart */

  var DIM_COLORS = {
    'AI_SEARCH_VISIBILITY': '#6366f1',
    'INFRA_COMPLETENESS': '#06b6d4',
    'COMPETITIVE_ADVANTAGE': '#f59e0b',
    'SENTIMENT_HEALTH': 'var(--dr-success)'
  };
  var DIM_NAMES = {
    'AI_SEARCH_VISIBILITY': 'AI搜索可见性',
    'INFRA_COMPLETENESS': '基建完善度',
    'COMPETITIVE_ADVANTAGE': '竞品对比优势',
    'SENTIMENT_HEALTH': '舆情健康度'
  };

  // ===== SVG Chart Helpers =====

  /**
   * 生成雷达图SVG
   * @param {Array} labels - 维度标签数组
   * @param {Array} values - 维度值数组(0-100)
   * @param {Array} colors - 维度颜色数组
   * @param {number} size - SVG尺寸
   * @param {string} fillColor - 填充颜色
   * @returns {string} SVG HTML字符串
   */
  function renderRadarChart(labels, values, colors, size, fillColor) {
    size = size || 260;
    fillColor = fillColor || 'rgb(13 148 136 / 18%)';
    var cx = size / 2;
    var cy = size / 2;
    var maxR = size / 2 - 70;
    var n = labels.length;
    if (n < 3) return '';

    function angle(i) { return (Math.PI * 2 * i / n) - Math.PI / 2; }
    function point(i, r) {
      var a = angle(i);
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    }

    var svg = '<svg class="dr-radar-chart" viewBox="0 0 ' + size + ' ' + size + '">';

    // Grid rings (3 levels)
    for (var level = 1; level <= 3; level++) {
      var r = maxR * level / 3;
      var pts = [];
      for (var i = 0; i < n; i++) {
        var p = point(i, r);
        pts.push(p.x.toFixed(1) + ',' + p.y.toFixed(1));
      }
      svg += '<polygon class="dr-radar-chart__grid" points="' + pts.join(' ') + '"/>';
    }

    // Axis lines
    for (var i = 0; i < n; i++) {
      var p = point(i, maxR);
      svg += '<line class="dr-radar-chart__axis" x1="' + cx + '" y1="' + cy + '" x2="' + p.x.toFixed(1) + '" y2="' + p.y.toFixed(1) + '"/>';
    }

    // Data area
    var dataPts = [];
    for (var i = 0; i < n; i++) {
      var v = Math.max(0, Math.min(100, values[i] || 0));
      var r = maxR * v / 100;
      var p = point(i, r);
      dataPts.push(p.x.toFixed(1) + ',' + p.y.toFixed(1));
    }
    svg += '<polygon class="dr-radar-chart__area" points="' + dataPts.join(' ') + '" fill="' + fillColor + '" stroke="' + (colors[0] || 'var(--dr-primary)') + '" stroke-width="2"/>';

    // Data dots
    for (var i = 0; i < n; i++) {
      var v = Math.max(0, Math.min(100, values[i] || 0));
      var r = maxR * v / 100;
      var p = point(i, r);
      svg += '<circle class="dr-radar-chart__dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="4" fill="' + (colors[i] || '#6366f1') + '" stroke="#fff" stroke-width="1.5"/>';
    }

    // Labels
    for (var i = 0; i < n; i++) {
      var p = point(i, maxR + 22);
      var anchor = 'middle';
      var dx = 0;
      var dy = 0;
      var a = angle(i);
      if (Math.abs(Math.cos(a)) > 0.3) {
        dx = Math.cos(a) > 0 ? 4 : -4;
        anchor = Math.cos(a) > 0 ? 'start' : 'end';
      }
      if (Math.sin(a) < -0.5) dy = -4;
      if (Math.sin(a) > 0.5) dy = 6;
      svg += '<text class="dr-radar-chart__label" x="' + (p.x + dx).toFixed(1) + '" y="' + (p.y + dy).toFixed(1) + '" text-anchor="' + anchor + '">' + esc(labels[i]) + '</text>';
    }

    svg += '</svg>';
    return svg;
  }

  /**
   * 生成环形图SVG
   * @param {number} positive - 正面比例(0-1)
   * @param {number} negative - 负面比例(0-1)
   * @param {number} neutral - 中性比例(0-1)
   * @param {number} size - SVG尺寸
   * @returns {string} SVG HTML字符串
   */
  function renderDonutChart(positive, negative, neutral, size) {
    // 兼容0-100整数和0-1小数两种输入
    if (positive > 1 || negative > 1 || neutral > 1) {
      positive = positive / 100; negative = negative / 100; neutral = neutral / 100;
    }
    size = size || 140;
    var cx = size / 2;
    var cy = size / 2;
    var outerR = size / 2 - 4;
    var innerR = outerR * 0.62;
    var C = 2 * Math.PI * outerR;

    var segments = [
      { value: positive, color: '#059669' },
      { value: neutral, color: '#94a3b8' },
      { value: negative, color: '#dc2626' }
    ];

    var svg = '<svg class="dr-donut-chart" viewBox="0 0 ' + size + ' ' + size + '">';

    // Background ring
    svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + outerR + '" fill="none" stroke="#f1f5f9" stroke-width="' + (outerR - innerR) + '"/>';

    // Segments
    var offset = 0;
    segments.forEach(function(seg) {
      if (seg.value <= 0) return;
      var dashLen = C * seg.value;
      var dashOffset = C * offset;
      svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + outerR + '" fill="none" stroke="' + seg.color + '" stroke-width="' + (outerR - innerR) + '" stroke-dasharray="' + dashLen.toFixed(2) + ' ' + (C - dashLen).toFixed(2) + '" stroke-dashoffset="' + (-dashOffset).toFixed(2) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')"/>';
      offset += seg.value;
    });

    // Center text
    var mainPct = Math.round(positive * 100);
    svg += '<text class="dr-donut-chart__center-text" x="' + cx + '" y="' + (cy - 2) + '" text-anchor="middle" dominant-baseline="central">' + Math.min(mainPct, 100) + '%</text>';
    svg += '<text class="dr-donut-chart__center-label" x="' + cx + '" y="' + (cy + 14) + '" text-anchor="middle">正面</text>';

    svg += '</svg>';
    return svg;
  }

  /**
   * 生成水平柱状图SVG
   * @param {Array} items - [{name, value, color}]
   * @param {number} width - SVG宽度
   * @param {number} barHeight - 柱高
   * @returns {string} SVG HTML字符串
   */
  function renderHBarChart(items, width, barHeight) {
    width = width || 520;
    barHeight = barHeight || 28;
    var gap = 12;
    var labelW = 80;
    var valueW = 40;
    var chartW = width - labelW - valueW - 16;
    var h = items.length * (barHeight + gap) - gap + 8;
    var maxVal = 0;
    items.forEach(function(it) { if (it.value > maxVal) maxVal = it.value; });
    if (maxVal === 0) maxVal = 100;

    var svg = '<svg class="dr-hbar-chart" viewBox="0 0 ' + width + ' ' + h + '">';

    items.forEach(function(it, idx) {
      var y = idx * (barHeight + gap) + 4;
      var barW = Math.max(2, chartW * (it.value / maxVal));

      // Label
      svg += '<text class="dr-hbar-chart__label" x="' + (labelW - 8) + '" y="' + (y + barHeight / 2 + 4) + '" text-anchor="end">' + esc(it.name) + '</text>';

      // Bar background
      svg += '<rect class="dr-hbar-chart__bar-bg" x="' + labelW + '" y="' + y + '" width="' + chartW + '" height="' + barHeight + '" rx="4"/>';

      // Bar fill
      svg += '<rect class="dr-hbar-chart__bar-fill" x="' + labelW + '" y="' + y + '" width="' + barW + '" height="' + barHeight + '" fill="' + it.color + '"/>';

      // Value
      svg += '<text class="dr-hbar-chart__value" x="' + (labelW + chartW + 8) + '" y="' + (y + barHeight / 2 + 4) + '">' + it.value + '</text>';
    });

    svg += '</svg>';
    return svg;
  }

        '<span class="stage-comp__advantage-name">' + esc(brandName) + '</span>' +

      brandStrengths.forEach(function(s) {
        h += '<div class="stage-comp__advantage-item stage-comp__advantage-item--strength">' +

          '<span class="stage-comp__advantage-icon">&#9660;</span><span>' + esc(w) + '</span></div>';
      });
      h += '</div></div>';

      // Competitor cards
      competitors.slice(0, 3).forEach(function(c) {
        var diff = brandScore - (c.geoScore || 0);
        var diffText = diff > 0 ? '领先 ' + diff + ' 分' : (diff < 0 ? '落后 ' + Math.abs(diff) + ' 分' : '持平');
        var diffColor = diff >= 0 ? 'var(--dr-success)' : 'var(--dr-danger)';
        h += '<div class="stage-comp__advantage-card stage-comp__advantage-card--competitor">' +
          '<div class="stage-comp__advantage-header">' +
          '<span class="stage-comp__advantage-badge stage-comp__advantage-badge--competitor">竞品</span>' +
          '<span class="stage-comp__advantage-name">' + esc(c.name) + '</span>' +
          '<span class="stage-comp__advantage-score" style="color:' + getColor(c.geoScore || 0) + ';">' + (c.geoScore || 0) + '</span></div>' +
          '<div class="stage-comp__advantage-list">';
        (c.productFeatures || []).forEach(function(f) {
          h += '<div class="stage-comp__advantage-item stage-comp__advantage-item--strength">' +
            '<span class="stage-comp__advantage-icon">&#9650;</span><span>' + esc(f) + '</span></div>';
        });
        (c.weaknesses || []).forEach(function(w) {
          h += '<div class="stage-comp__advantage-item stage-comp__advantage-item--weakness">' +
            '<span class="stage-comp__advantage-icon">&#9660;</span><span>' + esc(w) + '</span></div>';
        });
        h += '</div>' +
          '<div class="stage-comp__advantage-vs">' +
          '<span>vs ' + esc(brandName) + '</span>' +
          '<span class="stage-comp__advantage-vs-arrow" style="color:' + diffColor + ';">' + diffText + '</span></div></div>';
      });

      h += '</div></div>';

    if (position) {
      h += '<div class="stage-comp__position" style="margin-top:24px;"><div class="stage-comp__section-title">市场定位</div>' +
        '<p class="stage-comp__position-text">' + esc(position) + '</p></div>';
    }

    h += '</section>';
    return h;
  }

  // ===== 07 GEO Effect =====
  function renderGeoEffect(d) {
    var geo = (d.stages || {}).GEO_EFFECT || {};
    var ov = geo.overview || {};
    var breakdown = (geo.platformBreakdown || []).slice(0, 8);

    var h = '<section id="section-geo" class="dr-section"><div class="dr-section__header">' +
      '<div class="dr-section__num">07</div><div class="dr-section__title-group"><h2 class="dr-section__title">收录效果</h2>' +
      '<p class="dr-section__subtitle">收录与提及率统计</p></div></div>';

    h += '<div class="stage-geo__stats">' +
      '<div class="stage-geo__stat-card stage-geo__stat-card--highlight"><div class="stage-geo__stat-value">' + (ov.scenarioCount || 0) + '</div><div class="stage-geo__stat-label">搜索场景</div></div>' +
      '<div class="stage-geo__stat-card"><div class="stage-geo__stat-value">' + (ov.questionCount || 0) + '</div><div class="stage-geo__stat-label">测试问题</div></div>' +
      '<div class="stage-geo__stat-card"><div class="stage-geo__stat-value">' + (ov.mentionedCount || 0) + '</div><div class="stage-geo__stat-label">品牌提及</div></div>' +
      '<div class="stage-geo__stat-card"><div class="stage-geo__stat-value" style="color:' + getMentionColor(ov.mentionRate || 0) + ';">' + fmtRate(ov.mentionRate || 0) + '%</div><div class="stage-geo__stat-label">提及率</div></div></div>';

    if (breakdown.length) {
      h += '<div class="stage-geo__section"><div class="stage-geo__section-title">各平台提及分布</div><div class="stage-geo__chart-row"><div class="stage-geo__breakdown-list">';
      breakdown.forEach(function(b) {
        var rate = b.rate || 0;
        h += '<div class="stage-geo__breakdown-item"><span class="stage-geo__breakdown-name">' + esc(b.platformName) + '</span>' +
          '<div class="stage-geo__breakdown-bar"><div class="stage-geo__breakdown-fill" style="width:' + (rate * 100) + '%;"></div></div>' +
          '<span class="stage-geo__breakdown-rate">' + fmtRate(rate) + '%</span></div>';

  // ===== 08 Sentiment =====
  function renderSentiment(d) {
    var sen = (d.stages || {}).SENTIMENT || {};
    var summary = sen.summary || {};
    var riskLevel = summary.riskLevel || sen.riskLevel || '低风险';
    var trend = summary.trendDirection || sen.trendDirection || 'stable';
    var dist = sen.sentimentDistribution || {};
    var drivers = sen.keyDrivers || {};
    var issues = (sen.issues || []).slice(0, 5);
    var suggestions = (sen.suggestions || []).slice(0, 5);
    var negRate = summary.overallNegativeRate || 0;

    var trendMap = { 'up': { cls: 'up', emoji: '&#128200;' }, 'stable': { cls: 'stable', emoji: '&#10145;' }, 'down': { cls: 'down', emoji: '&#128201;' } };
    var trendInfo = trendMap[trend] || trendMap['stable'];

    var h = '<section id="section-sentiment" class="dr-section"><div class="dr-section__header">' +
      '<div class="dr-section__num">08</div><div class="dr-section__title-group"><h2 class="dr-section__title">舆情分析</h2>' +
      '<p class="dr-section__subtitle">口碑评价与风险预警</p></div></div>';

    h += '<div class="stage-sentiment__top-row"><div class="stage-sentiment__indicators">' +
      '<div class="stage-sentiment__indicator"><div class="stage-sentiment__indicator-icon stage-sentiment__indicator-icon--' + trendInfo.cls + '">' + trendInfo.emoji + '</div>' +
      '<div class="stage-sentiment__indicator-content"><div class="stage-sentiment__indicator-label">风险等级</div><div class="stage-sentiment__indicator-value">' + esc(riskLevel) + '</div></div></div>' +
      '<div class="stage-sentiment__indicator"><div class="stage-sentiment__indicator-icon stage-sentiment__indicator-icon--' + trendInfo.cls + '">' + trendInfo.emoji + '</div>' +
      '<div class="stage-sentiment__indicator-content"><div class="stage-sentiment__indicator-label">舆情趋势</div><div class="stage-sentiment__indicator-value">' + esc(trend === 'up' ? '上升' : trend === 'down' ? '下降' : '平稳') + '</div></div></div></div>' +
      '<div class="stage-sentiment__mini-chart">' + renderDonutChart(dist.positive || 0, dist.negative || 0, dist.neutral || 0, 120) + '</div></div>';

    // Drivers
    if (drivers.positive || drivers.negative) {
      h += '<div class="stage-sentiment__drivers">';
      if (drivers.positive && drivers.positive.length) {
        h += '<div class="stage-sentiment__driver-group"><span class="stage-sentiment__driver-title stage-sentiment__driver-title--positive">&#10022; 正面口碑</span><div class="stage-sentiment__driver-tags">';
        drivers.positive.forEach(function(k) { h += '<span class="stage-sentiment__driver-tag stage-sentiment__driver-tag--positive">' + esc(k) + '</span>'; });
        h += '</div></div>';
      }
      if (drivers.negative && drivers.negative.length) {
        h += '<div class="stage-sentiment__driver-group"><span class="stage-sentiment__driver-title stage-sentiment__driver-title--negative">&#10022; 负面口碑</span><div class="stage-sentiment__driver-tags">';
        drivers.negative.forEach(function(k) { h += '<span class="stage-sentiment__driver-tag stage-sentiment__driver-tag--negative">' + esc(k) + '</span>'; });
        h += '</div></div>';
      }
      h += '</div>';
    }

    // Issues
    if (issues.length) {
      h += '<div class="stage-sentiment__section"><div class="stage-sentiment__section-title">舆情问题 <span class="stage-sentiment__section-count">共' + issues.length + '条</span></div>' +
        '<div class="stage-sentiment__issue-list">';
      issues.forEach(function(issue) {
        var isNeg = issue.sentiment === '负面';
        h += '<div class="stage-sentiment__issue-row">' +
          '<span class="stage-sentiment__issue-tag" style="background:' + (isNeg ? '#fef2f2' : '#f0fdf4') + ';color:' + (isNeg ? '#dc2626' : '#059669') + ';">' + esc(issue.sentiment || '中性') + '</span>' +
          '<span class="stage-sentiment__issue-text">' + esc(issue.content) + '</span>' +
          '<span class="stage-sentiment__issue-source">' + esc(issue.source || '') + '</span></div>';
      });
      h += '</div></div>';
    }

    // Suggestions
    if (suggestions.length) {
      h += '<div class="stage-sentiment__section"><div class="stage-sentiment__section-title">应对建议</div><ol class="stage-sentiment__suggestion-list">';
      suggestions.forEach(function(s) { h += '<li class="stage-sentiment__suggestion-item">' + esc(s) + '</li>'; });
      h += '</ol></div>';
    }

    h += '</section>';
    return h;
  }

  // ===== 09 Suggestion =====
  function renderSuggestion(d) {
    var sug = (d.stages || {}).SUGGESTION || {};
    var proj = sug.scoreProjection || {};
    var quickWins = (sug.quickWins || []).slice(0, 3);
    var actions = (sug.priorityActions || sug.suggestions || []).slice(0, 5);
    var roadmap = sug.roadmap || [];
    var summary = sug.summary || '';
    var dimSummary = sug.dimensionSummary || [];
    var longTerm = sug.longTermSuggestions || [];

    var h = '<section id="section-suggestion" class="dr-section"><div class="dr-section__header">' +
      '<div class="dr-section__num">09</div><div class="dr-section__title-group"><h2 class="dr-section__title">综合建议</h2>' +
      '<p class="dr-section__subtitle">优化建议与行动路线</p></div></div>';

    // Score projection
    var curScore = proj.currentScore || 0;
    var projScore = proj.projectedScore || 0;
    var delta = projScore - curScore;
    var curSc = getColor(curScore);

    h += '<div class="sg-section sg-projection"><div class="sg-projection__header">' +
      '<div class="sg-projection__title-group"><div class="sg-section__icon-wrap sg-section__icon-wrap--projection">&#128200;</div><div>' +
      '<div class="sg-section__title">AIVO分数预测</div><div class="sg-section__subtitle">执行优化建议后的预期提升</div></div></div>' +
      '<div class="sg-projection__score-compare"><div class="sg-projection__score-item"><div class="sg-projection__score-label">当前</div>' +
      '<div class="sg-projection__score-value" style="color:' + curSc + ';">' + curScore + '</div></div>' +
      '<div class="sg-projection__arrow">&rarr;</div><div class="sg-projection__score-item"><div class="sg-projection__score-label">预测</div>' +
      '<div class="sg-projection__score-value" style="color:var(--dr-success);">' + projScore + '</div></div>' +
      '<div class="sg-projection__delta" style="color:var(--dr-success);">(+' + delta + ')</div></div></div>';

    if (dimSummary.length) {
      h += '<div class="sg-projection__dims">';
      var dimColorMap = { 'visibility': '#6366f1', 'content': '#06b6d4', 'authority': 'var(--dr-success)', 'engagement': '#f59e0b' };
      var dimLabelMap = { 'visibility': '搜索可见度', 'content': '内容适配度', 'authority': '权威性', 'engagement': '用户参与度' };
      dimSummary.forEach(function(ds) {
        var dc = dimColorMap[ds.dimension] || '#6366f1';
        var dl = dimLabelMap[ds.dimension] || ds.dimension;
        var cur = ds.currentScore || 0;
        var pro = ds.projectedScore || 0;
        h += '<div class="sg-projection__dim-bar"><span class="sg-projection__dim-label">' + esc(dl) + '</span>' +
          '<div class="sg-projection__dim-track"><div class="sg-projection__dim-fill sg-projection__dim-fill--current" style="width:' + cur + '%;background:' + dc + ';opacity:0.3;"></div>' +
          '<div class="sg-projection__dim-fill sg-projection__dim-fill--projected" style="width:' + pro + '%;background:' + dc + ';"></div></div>' +
          '<div class="sg-projection__dim-nums"><span style="color:' + dc + ';">' + cur + '</span>' +
          '<span class="sg-projection__dim-arrow">&rarr;</span><span style="color:var(--dr-success);">' + pro + '</span></div></div>';
      });
      h += '</div>';
    }
    h += '</div>';

    // Quick Wins
    if (quickWins.length) {
      h += '<div class="sg-section"><div class="sg-section__header"><div class="sg-section__icon-wrap sg-section__icon-wrap--quickwin">&#9889;</div><div>' +
        '<div class="sg-section__title">快速赢利点</div><div class="sg-section__subtitle">低成本高收益的即时优化</div></div></div>' +
        '<div class="sg-quickwins__grid">';
      quickWins.forEach(function(qw) {
        h += '<div class="sg-quickwins__card"><span class="sg-quickwins__card-badge">Quick Win</span>' +
          '<div class="sg-quickwins__card-title">' + esc(qw.title) + '</div>' +
          '<div class="sg-quickwins__card-desc">' + esc(qw.description) + '</div>' +
          '<div class="sg-quickwins__card-meta"><span class="sg-quickwins__card-timeline">&#9201; ' + esc(qw.timeline || '') + '</span>' +
          '<span class="sg-quickwins__card-impact">+' + (qw.expectedImprovement || 0) + '分</span></div>';
        if (qw.nextSteps && qw.nextSteps.length) {
          h += '<div class="sg-quickwins__card-steps">';
          qw.nextSteps.forEach(function(s) { h += '<div class="sg-quickwins__step"><span class="sg-quickwins__step-icon">&#9656;</span><span>' + esc(s) + '</span></div>'; });
          h += '</div>';
        }
        h += '</div>';
      });
      h += '</div></div>';
    }

    // Priority Actions
    if (actions.length) {
      h += '<div class="sg-section"><div class="sg-section__header"><div class="sg-section__icon-wrap sg-section__icon-wrap--actions">&#127919;</div><div>' +
        '<div class="sg-section__title">优先行动建议</div><div class="sg-section__subtitle">按优先级排序的优化行动</div></div></div>';

      // Priority bar
      var counts = { high: 0, medium: 0, low: 0 };
      actions.forEach(function(a) { counts[a.priority] = (counts[a.priority] || 0) + 1; });
      var total = actions.length || 1;
      h += '<div class="sg-actions__priority-bar"><div class="sg-actions__priority-track">' +
        '<div class="sg-actions__priority-seg sg-actions__priority-seg--urgent" style="width:' + ((counts.high || 0) / total * 100) + '%;"></div>' +
        '<div class="sg-actions__priority-seg sg-actions__priority-seg--high" style="width:0%;"></div>' +
        '<div class="sg-actions__priority-seg sg-actions__priority-seg--medium" style="width:' + ((counts.medium || 0) / total * 100) + '%;"></div>' +
        '<div class="sg-actions__priority-seg sg-actions__priority-seg--low" style="width:' + ((counts.low || 0) / total * 100) + '%;"></div></div>' +
        '<div class="sg-actions__priority-legend">' +
        '<span class="sg-actions__legend-item"><span class="sg-actions__legend-dot sg-actions__legend-dot--urgent"></span>紧急</span>' +
        '<span class="sg-actions__legend-item"><span class="sg-actions__legend-dot sg-actions__legend-dot--high"></span>高优</span>' +
        '<span class="sg-actions__legend-item"><span class="sg-actions__legend-dot sg-actions__legend-dot--medium"></span>中等</span>' +
        '<span class="sg-actions__legend-item"><span class="sg-actions__legend-dot sg-actions__legend-dot--low"></span>建议</span></div></div>';

      h += '<div class="sg-actions__list">';
      actions.forEach(function(a, idx) {
        var pi = getPriorityInfo(a.priority);
        var impactCls = a.impactLevel || 'medium';
        var effortCls = a.effortLevel || 'moderate';
        h += '<div class="sg-action-card sg-action-card--' + pi.cls + '">' +
          '<div class="sg-action-card__header"><span class="sg-action-card__step">' + (idx + 1) + '</span>' +
          '<div class="sg-action-card__meta"><span class="sg-action-card__priority-tag" style="background:' + pi.bg + ';color:' + pi.color + ';">' + pi.label + '</span></div>' +
          '<span class="sg-action-card__title">' + esc(a.title) + '</span>' +
          '<div class="sg-action-card__badges">' +
          '<span class="sg-action-card__badge sg-action-card__badge--impact ' + impactCls + '">+' + (a.expectedImprovement || 0) + '分</span>' +
          '<span class="sg-action-card__badge sg-action-card__badge--effort ' + effortCls + '">' + esc(a.effortLevel || '') + '</span></div></div>' +
          '<div class="sg-action-card__detail"><div class="sg-action-card__desc">' + esc(a.description) + '</div>' +
          '<div class="sg-action-card__timeline-tag">&#9201; ' + esc(a.timeline || '') + '</div></div></div>';
      });
      h += '</div></div>';
    }

    // Roadmap
    if (roadmap.length) {
      h += '<div class="sg-section"><div class="sg-section__header"><div class="sg-section__icon-wrap sg-section__icon-wrap--roadmap">&#128506;</div><div>' +
        '<div class="sg-section__title">实施路线图</div><div class="sg-section__subtitle">分阶段优化路径</div></div></div>' +
        '<div class="sg-roadmap__timeline">';
      roadmap.forEach(function(phase, idx) {
        if (idx > 0) h += '<div class="sg-roadmap__phase-connector"></div>';
        h += '<div class="sg-roadmap__phase sg-roadmap__phase--' + idx + '"><div class="sg-roadmap__phase-header">' +
          '<span class="sg-roadmap__phase-badge">' + (idx + 1) + '</span><div>' +
          '<div class="sg-roadmap__phase-title">' + esc(phase.title) + '</div>' +
          '<div class="sg-roadmap__phase-timeline">' + esc(phase.timeline || '') + '</div></div></div>' +
          '<div class="sg-roadmap__phase-items">';
        (phase.items || []).forEach(function(item) {
          h += '<div class="sg-roadmap__item"><span class="sg-roadmap__item-dot"></span><span>' + esc(item) + '</span></div>';
        });
        h += '</div></div>';
      });
      h += '</div></div>';
    }

    // Summary
    if (summary) {
      h += '<div class="sg-section"><div class="sg-summary"><div class="sg-summary__icon-wrap">&#128172;</div><div>' +
        '<div class="sg-summary__label">综合评语</div><div class="sg-summary__text">' + esc(summary) + '</div></div></div></div>';
    }

    h += '</section>';
    return h;
  }

  // ===== Executive Summary =====
  function renderSummary(d) {
    var ov = (d.stages || {}).OVERVIEW || {};
    var sug = (d.stages || {}).SUGGESTION || {};
    var highlights = (ov.highlights || []).slice(0, 2);
    var risks = (ov.risks || []).slice(0, 2);
    var actions = (sug.quickWins || []).slice(0, 2);
    if (!actions.length) actions = (sug.priorityActions || []).slice(0, 2);

    var items = [];
    highlights.forEach(function(h) { items.push({ type: 'positive', icon: '&#10003;', text: h }); });
    risks.forEach(function(r) { items.push({ type: 'negative', icon: '&#9888;', text: r }); });
    actions.forEach(function(a) { items.push({ type: 'action', icon: '&rarr;', text: a.title || a }); });

    var h = '<div class="dr-summary"><h3 class="dr-summary__title">执行摘要</h3><div class="dr-summary__grid">';
    items.forEach(function(item) {
      h += '<div class="dr-summary__item dr-summary__item--' + item.type + '">' +
        '<span class="dr-summary__icon">' + item.icon + '</span>' +
        '<span class="dr-summary__text">' + esc(item.text) + '</span></div>';
    });
    h += '</div></div>';
    return h;
  }

  // ===== Footer =====
  function renderFooter(d) {
    var date = new Date().toISOString().slice(0, 10);
    return '<section class="dr-footer"><div class="dr-footer__divider"></div><div class="dr-footer__content">' +
      '<div class="dr-footer__block"><div class="dr-footer__title">评估方法</div>' +
      '<div class="dr-footer__text">基于AIVO四维评分模型（AI可见性 + 内容适配度 + 权威性 + 用户参与度），对品牌在AI搜索场景中的可见度进行量化评估。三轮流水线驱动，9章节完整诊断。</div></div>' +
      '<div class="dr-footer__meta"><span>生成时间：' + date + '</span><span>评估引擎：GEO AIVO v3.0</span></div></div></section>';
  }

  // ===== Main =====
  function init() {
    var dataEl = document.getElementById('report-data');
    if (!dataEl) return;
    var raw = dataEl.textContent;
    if (!raw || raw.trim() === '{}') {
      document.querySelector('.dr-content').innerHTML = '<div style="text-align:center;padding:80px 20px;color:var(--dr-text-placeholder);"><div style="font-size:48px;margin-bottom:16px;">&#128202;</div><div style="font-size:18px;font-weight:600;color:var(--dr-text-secondary);">暂无诊断数据</div><div style="font-size:14px;margin-top:8px;">请确认报告数据已正确加载</div></div>';
      return;
    }
    var d;
    try { d = JSON.parse(raw); } catch(e) { console.error('Failed to parse report data', e); return; }

    document.title = (d.brand || '') + ' · ' + (d.category || '') + ' GEO诊断报告';

    var sections = [
      ['hero-section', renderHero],
      ['section-overview', renderOverview],
      ['section-aivo', renderAivoScore],
      ['section-profile', renderUserProfile],
      ['section-search', renderAiSearch],
      ['section-infra', renderInfraEval],
      ['section-competitor', renderCompetitor],
      ['section-geo', renderGeoEffect],
      ['section-sentiment', renderSentiment],
      ['section-suggestion', renderSuggestion],
      ['executive-summary', renderSummary],
      ['report-footer', renderFooter]
    ];

    sections.forEach(function(pair) {
      var el = document.getElementById(pair[0]);
      if (el) {
        try { el.innerHTML = pair[1](d); } catch(e) { console.error('Render error for ' + pair[0], e); }
      }
    });

    // ===== Build Side Navigation =====
    var navSections = [
      { id: 'section-overview', num: '01', label: '诊断概览' },
      { id: 'section-aivo', num: '02', label: 'AIVO评分' },
      { id: 'section-profile', num: '03', label: '用户画像' },
      { id: 'section-search', num: '04', label: '搜索可见性' },
      { id: 'section-infra', num: '05', label: '基建评估' },
      { id: 'section-competitor', num: '06', label: '竞品分析' },
      { id: 'section-geo', num: '07', label: '收录效果' },
      { id: 'section-sentiment', num: '08', label: '舆情分析' },
      { id: 'section-suggestion', num: '09', label: '综合建议' }
    ];

    var sideNav = document.getElementById('side-nav');
    if (sideNav) {
      var navHtml = '';
      navSections.forEach(function(sec, idx) {
        if (idx > 0) navHtml += '<div class="dr-side-nav__divider"></div>';
        navHtml += '<a class="dr-side-nav__item" data-target="' + sec.id + '">' +
          '<span class="dr-side-nav__num">' + sec.num + '</span>' +
          '<span class="dr-side-nav__label">' + esc(sec.label) + '</span></a>';
      });
      sideNav.innerHTML = navHtml;

      // Click to scroll
      sideNav.addEventListener('click', function(e) {
        var item = e.target.closest('.dr-side-nav__item');
        if (!item) return;
        var targetId = item.getAttribute('data-target');
        var targetEl = document.getElementById(targetId);
        if (targetEl) {
          targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    }

    // ===== IntersectionObserver for side nav highlighting & entrance animations =====
    var navItems = sideNav ? sideNav.querySelectorAll('.dr-side-nav__item') : [];
    var activeNavIdx = -1;

    function setActiveNav(idx) {
      if (idx === activeNavIdx) return;
      activeNavIdx = idx;
      navItems.forEach(function(ni, i) {
        if (i === idx) {
          ni.classList.add('dr-side-nav__item--active');
        } else {
          ni.classList.remove('dr-side-nav__item--active');
        }
      });
    }

    // Observe sections for nav highlighting
    var navObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var secId = entry.target.id;
          var idx = navSections.findIndex(function(s) { return s.id === secId; });
          if (idx >= 0) setActiveNav(idx);
        }
      });
    }, { rootMargin: '-20% 0px -60% 0px', threshold: 0 });

    navSections.forEach(function(sec) {
      var el = document.getElementById(sec.id);
      if (el) navObserver.observe(el);
    });

    // Set first nav item active by default
    setActiveNav(0);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
